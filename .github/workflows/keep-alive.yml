name: Keep API Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 60 "${{ secrets.VITE_API_URL }}/api/healthz")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS (server may be waking up)"
          fi
