<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA redirect: encode the path and redirect to index.html
    var seg = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      l.pathname.split('/').slice(0, 1 + seg).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1).split('/').slice(seg).join('/')) +
      (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
